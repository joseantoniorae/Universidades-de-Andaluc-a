<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Empty Style</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
  <script src="https://unpkg.com/maplibre-gl@5.21.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@5.21.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
      const map = new maplibregl.Map({
         container: 'map',
         style: {
  "version": 8,
  "name": "Empty Style",
  "metadata": {},
  "sources": {
    "openmaptiles": {
      "type": "vector",
      "url": "https://api.maptiler.com/tiles/v3-openmaptiles/tiles.json?key=get_your_own_OpIi9ZULNHzrESv6T2vL"
    },
    "fc8y0b3": {
      "type": "vector",
      "url": "https://localhost:3000/tilejson.json"
    },
    "toghprl": {"type": "vector", "url": "https://localhost:3000/tilejson.json"}
  },
  "sprite": "",
  "glyphs": "https://orangemug.github.io/font-glyphs/glyphs/{fontstack}/{range}.pbf",
  "layers": [
    {
      "id": "Fondo",
      "type": "background",
      "paint": {"background-color": "rgba(162, 248, 164, 1)"}
    },
    {
      "id": "agua",
      "type": "fill",
      "source": "openmaptiles",
      "source-layer": "water",
      "paint": {"fill-color": "rgba(14, 243, 253, 1)"}
    },
    {
      "id": "limites",
      "type": "line",
      "source": "openmaptiles",
      "source-layer": "boundary",
      "paint": {"line-opacity": 0.5}
    }
  ],
  "id": "9hlsvzp"
},
      });
      map.addControl(new maplibregl.NavigationControl());
  </script>
</body>
</html>
